<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sample Card</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, Roboto, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 24px;
    box-sizing: border-box;
  }
  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
  }
  h1 {
    font-size: 28px;
    margin: 0 0 8px;
    letter-spacing: -0.5px;
    color: #1a1a1a;
  }
  p.sub {
    margin: 0 0 20px;
    color: #6b7280;
    line-height: 1.5;
    font-size: 15px;
  }
  .emoji-row {
    font-size: 36px;
    margin-bottom: 20px;
  }
  .tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tag {
    background: #eef2ff;
    color: #4f46e5;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Pixel-perfect export ✨</h1>
    <p class="sub">This card is rendered by the real Chromium engine on your phone — true kerning, true line-height, true emoji glyphs.</p>
    <div class="emoji-row">🎨 🚀 📸 🔥 ✅</div>
    <div class="tags">
      <span class="tag">Web fonts</span>
      <span class="tag">Emoji</span>
      <span class="tag">Gradients</span>
      <span class="tag">Shadows</span>
    </div>
  </div>
</body>
</html>
